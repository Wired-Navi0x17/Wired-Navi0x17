<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="100%" height="auto">
    <style>
        .terminal-bg {
            fill: #120e16;
            stroke: #8c6e5e;
            stroke-width: 2.5;
        }
        .scanlines {
            fill: url(#scanline-pattern);
            opacity: 0.15;
        }
        .title-text {
            fill: #e6dcf0;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 13px;
        }
        .console-text {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 14px;
        }
        .glow {
            filter: url(#crt-glow);
        }
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        .cursor {
            animation: blink 1s infinite;
            fill: #8c6e5e;
        }
        @keyframes scanline-anim {
            0% { transform: translateY(0); }
            100% { transform: translateY(8px); }
        }
        .scanline-pattern-rect {
            animation: scanline-anim 4s linear infinite;
        }
    </style>

    <defs>
        <!-- CRT Glow Filter -->
        <filter id="crt-glow" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur stdDeviation="1.5" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        
        <!-- Scanline Pattern -->
        <pattern id="scanline-pattern" width="820" height="8" patternUnits="userSpaceOnUse">
            <rect width="820" height="4" fill="#000" />
            <rect y="4" width="820" height="4" fill="transparent" />
        </pattern>
    </defs>

    <!-- Terminal Window Frame -->
    <rect class="terminal-bg" width="820" height="480" rx="8" />
    
    <!-- CRT Effect Scanlines -->
    <rect class="scanlines" width="820" height="480" rx="8" pointer-events="none" />
    
    <!-- Header Bar -->
    <rect x="0" y="0" width="820" height="35" rx="8" fill="#2d2238" />
    <!-- Window buttons -->
    <circle cx="20" cy="18" r="6" fill="#cfa5df" />
    <circle cx="40" cy="18" r="6" fill="#dfb15b" />
    <circle cx="60" cy="18" r="6" fill="#a5c2d8" />
    
    <!-- Header Title -->
    <text x="410" y="22" class="title-text" text-anchor="middle" font-weight="bold">Wired-Navi0x1F@NAVI-Terminal:~ (Protocol: Copula-0x1F)</text>
    
    <!-- System Diagnostics -->
    <g class="console-text glow">
        <!-- Diagnostic Block (Right Side) -->
        <rect x="520" y="70" width="250" height="135" rx="4" fill="#120e16" stroke="#2d2238" stroke-width="1.5" />
        <text x="535" y="95" fill="#a5c2d8" font-family="monospace" font-size="12" font-weight="bold">[SYSTEM DIAGNOSTICS]</text>
        <text x="535" y="120" fill="#e6dcf0" font-family="monospace" font-size="11">NODE: Wired-Navi0x1F</text>
        <text x="535" y="140" fill="#e6dcf0" font-family="monospace" font-size="11">COGNITIVE SYNC: 98.4%</text>
        <text x="535" y="160" fill="#e6dcf0" font-family="monospace" font-size="11">WIRED CONNECT: SYNCED</text>
        <text x="535" y="180" fill="#e6dcf0" font-family="monospace" font-size="10" fill-opacity="0.7">UPTIME: 1048596s</text>
        
        <!-- Welcome Messages (Left Side) -->
        <text x="50" y="75" fill="#a5c2d8" font-family="monospace" font-size="14" font-weight="bold">&gt; Initializing NAVI-OS v7.25...</text>
        
        <!-- ASCII Logo -->
        <text x="50" y="110" fill="#8c6e5e" font-family="monospace" font-size="12" font-weight="bold">   _  _  __   _  _  ____   ___    _  _   __   _  _  ____</text>
<text x="50" y="126" fill="#8c6e5e" font-family="monospace" font-size="12" font-weight="bold">  ( \/ )/  \ ( \/ )(_  _) / __)  ( \( ) /__\ ( \/ )(_  _)</text>
<text x="50" y="142" fill="#8c6e5e" font-family="monospace" font-size="12" font-weight="bold">   \  /(  O ) \  /  _)(_ ( (__    )  ( /(__)\ \  /   )(  </text>
<text x="50" y="158" fill="#8c6e5e" font-family="monospace" font-size="12" font-weight="bold">    \/  \__/   \/  (____) \___)  (_)\_)(__)(__) \/   (__)</text>

        
        <!-- Divider -->
        <line x1="50" y1="205" x2="770" y2="205" stroke="#2d2238" stroke-width="1.5" stroke-dasharray="5 5" />
        
        <!-- Skills Header -->
        <text x="50" y="225" fill="#dfb15b" font-family="monospace" font-size="14" font-weight="bold">&gt;_ core_modules_loaded</text>
        
        <!-- Skills/Languages List -->
        
        <text x="50" y="230" fill="#e6dcf0" font-family="monospace" font-size="14">
            <tspan fill="#6c5d77">&gt; </tspan>Java           : 
            <tspan fill="#a5c2d8">■■■■■■■■■□</tspan> 90%
        </text>
        
        <text x="50" y="255" fill="#e6dcf0" font-family="monospace" font-size="14">
            <tspan fill="#6c5d77">&gt; </tspan>Python         : 
            <tspan fill="#cfa5df">■■■■■■■■□□</tspan> 85%
        </text>
        
        <text x="50" y="280" fill="#e6dcf0" font-family="monospace" font-size="14">
            <tspan fill="#6c5d77">&gt; </tspan>Linux / Bash   : 
            <tspan fill="#dfb15b">■■■■■■■■□□</tspan> 80%
        </text>
        
        <text x="50" y="305" fill="#e6dcf0" font-family="monospace" font-size="14">
            <tspan fill="#6c5d77">&gt; </tspan>Rust           : 
            <tspan fill="#8c6e5e">■■■■■■□□□□</tspan> 60%
        </text>
        
        
        <!-- Terminal Prompt & Command Line -->
        <text x="50" y="355" fill="#e6dcf0" font-family="monospace" font-size="14">
            <tspan fill="#a5c2d8">Wired-Navi0x1F@wired</tspan>:<tspan fill="#cfa5df">~</tspan>$ cat thoughts.txt
        </text>
        
        <!-- thoughts.txt output -->
        <text x="50" y="385" fill="#6c5d77" font-family="monospace" font-size="13" font-style="italic">
            &quot;No matter where you are, everyone is always connected.&quot;
        </text>
        <text x="50" y="405" fill="#6c5d77" font-family="monospace" font-size="13" font-style="italic">
            &quot;There is no barrier between the Wired and the Real.&quot;
        </text>
        
        <!-- Blinking Prompt -->
        <text x="50" y="445" fill="#e6dcf0" font-family="monospace" font-size="14">
            <tspan fill="#a5c2d8">Wired-Navi0x1F@wired</tspan>:<tspan fill="#cfa5df">~</tspan>$ <tspan fill="#e6dcf0">El_Psy_Kongroo</tspan>
        </text>
        <rect x="298" y="432" width="8" height="15" class="cursor" />
    </g>
</svg>
