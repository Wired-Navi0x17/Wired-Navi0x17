<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 510" width="100%" height="auto">
    <style>
        .terminal-bg {
            fill: #0b0512;
        }
        .scanlines {
            fill: url(#scanline-pattern);
            opacity: 0.18;
        }
        .title-text {
            fill: #eeddfc;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 13px;
        }
        .console-text {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 14px;
        }
        .glow {
            filter: url(#crt-glow);
        }
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        .cursor {
            animation: blink 1s infinite;
            fill: #c084fc;
        }
    </style>

    <defs>
        <!-- CRT Glow Filter -->
        <filter id="crt-glow" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur stdDeviation="1.8" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        
        <!-- Scanline Pattern -->
        <pattern id="scanline-pattern" width="850" height="6" patternUnits="userSpaceOnUse">
            <rect width="850" height="3" fill="#000" />
            <rect y="3" width="850" height="3" fill="transparent" />
        </pattern>
        
        <!-- Diagonal Cyber Grid -->
        <pattern id="cyber-grid" width="30" height="30" patternUnits="userSpaceOnUse">
            <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#311840" stroke-width="0.7" opacity="0.15" />
        </pattern>

        <!-- Glass Reflection Gradient -->
        <linearGradient id="glass-reflection" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
            <stop offset="30%" stop-color="#ffffff" stop-opacity="0.04"/>
            <stop offset="31%" stop-color="#ffffff" stop-opacity="0.0"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
        </linearGradient>

        <!-- Curvature Inner Radial Shadow -->
        <radialGradient id="screen-curve" cx="50%" cy="50%" r="50%">
            <stop offset="80%" stop-color="#000000" stop-opacity="0.0"/>
            <stop offset="95%" stop-color="#000000" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#000000" stop-opacity="0.75"/>
        </radialGradient>

        <!-- Bezel Metallic Border -->
        <linearGradient id="bezel-metallic" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#2d153d"/>
            <stop offset="50%" stop-color="#150820"/>
            <stop offset="100%" stop-color="#09030d"/>
        </linearGradient>
    </defs>

    <!-- Bezel Monitor Frame (3D Casing) -->
    <rect x="0" y="0" width="850" height="510" rx="14" fill="url(#bezel-metallic)" stroke="#c084fc" stroke-width="1" />
    <!-- Bezel Highlight line -->
    <rect x="6" y="6" width="838" height="498" rx="10" fill="none" stroke="#522a6b" stroke-width="1.5" opacity="0.6" />

    <!-- Screen Bezel Cutout -->
    <rect x="14" y="14" width="822" height="482" rx="8" class="terminal-bg" />
    
    <!-- Immersive Background Silhouette: Telephone Pole and Powerlines (Lain visual essence) -->
    <g opacity="0.35">
        <!-- Power Pole -->
        <line x1="720" y1="14" x2="720" y2="496" stroke="#251233" stroke-width="8" />
        <line x1="640" y1="100" x2="800" y2="100" stroke="#251233" stroke-width="4" />
        <line x1="660" y1="180" x2="780" y2="180" stroke="#251233" stroke-width="3" />
        <!-- Diagonal wires -->
        <path d="M 0 120 Q 400 280, 720 180" fill="none" stroke="#311840" stroke-width="1.2" />
        <path d="M 0 160 Q 400 320, 720 180" fill="none" stroke="#311840" stroke-width="1.2" />
        <path d="M 0 80 Q 350 200, 720 100" fill="none" stroke="#311840" stroke-width="1.5" />
        <path d="M 0 40 Q 350 160, 720 100" fill="none" stroke="#311840" stroke-width="1.5" />
        <!-- Wires extending to the right -->
        <line x1="720" y1="100" x2="836" y2="140" stroke="#311840" stroke-width="1.5" />
        <line x1="720" y1="180" x2="836" y2="210" stroke="#311840" stroke-width="1.2" />
    </g>

    <!-- Diagonal Cyber Grid -->
    <rect x="14" y="14" width="822" height="482" fill="url(#cyber-grid)" rx="8" />
    
    <!-- CRT Effect Scanlines -->
    <rect x="14" y="14" width="822" height="482" class="scanlines" rx="8" pointer-events="none" />
    
    <!-- Sweeping Laser Scanline (CRT electron gun sweep) -->
    <rect x="15" y="35" width="820" height="2" fill="#00f0ff" opacity="0.35" filter="url(#crt-glow)">
        <animate attributeName="y" from="35" to="490" dur="8s" repeatCount="indefinite" />
    </rect>
    
    <!-- Header Bar inside screen -->
    <rect x="14" y="14" width="822" height="35" rx="8" fill="#311840" />
    <!-- Window buttons -->
    <circle cx="34" cy="32" r="5" fill="#ff66cc" />
    <circle cx="50" cy="32" r="5" fill="#eab308" />
    <circle cx="66" cy="32" r="5" fill="#00f0ff" />
    
    <!-- Header Title -->
    <text x="425" y="36" class="title-text" text-anchor="middle" font-weight="bold">Wired-Navi0x1F@NAVI-Terminal:~ (Protocol: Layer_07_Active)</text>
    
    <!-- System Diagnostics Block -->
    <g class="console-text glow">
        <!-- Diagnostic Block (Right Side) -->
        <rect x="540" y="70" width="265" height="135" rx="4" fill="#0b0512" stroke="#311840" stroke-width="1.5" />
        <text x="555" y="95" fill="#00f0ff" font-family="monospace" font-size="12" font-weight="bold">[SYSTEM DIAGNOSTICS]</text>
        <text x="555" y="120" fill="#eeddfc" font-family="monospace" font-size="11">NODE: Wired-Navi0x1F</text>
        <text x="555" y="140" fill="#eeddfc" font-family="monospace" font-size="11">WIRED PROTOCOL: ACTIVE</text>
        <text x="555" y="160" fill="#eeddfc" font-family="monospace" font-size="11">COGNITIVE SYNC: 98.4%</text>
        <text x="555" y="180" fill="#eeddfc" font-family="monospace" font-size="10" fill-opacity="0.7">REALM: Layer 07 // The Wired</text>
        
        <!-- Welcome Messages -->
        <text x="50" y="75" fill="#00f0ff" font-family="monospace" font-size="13" font-weight="bold">&gt; Initializing NAVI-OS v7.25...</text>
        
        <!-- ASCII Logo -->
        <text x="50" y="90" fill="#c084fc" font-family="monospace" font-size="8.5" font-weight="bold" xml:space="preserve">в–Ҳв–Ҳв•—    в–Ҳв–Ҳв•—в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—     в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв•—</text>
<text x="50" y="102" fill="#c084fc" font-family="monospace" font-size="8.5" font-weight="bold" xml:space="preserve">в–Ҳв–Ҳв•‘    в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—    в–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘</text>
<text x="50" y="114" fill="#c084fc" font-family="monospace" font-size="8.5" font-weight="bold" xml:space="preserve">в–Ҳв–Ҳв•‘ в–Ҳв•— в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘    в–Ҳв–Ҳв•”в–Ҳв–Ҳв•— в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘</text>
<text x="50" y="126" fill="#c084fc" font-family="monospace" font-size="8.5" font-weight="bold" xml:space="preserve">в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘    в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•— в–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘</text>
<text x="50" y="138" fill="#c084fc" font-family="monospace" font-size="8.5" font-weight="bold" xml:space="preserve">в•ҡв–Ҳв–Ҳв–Ҳв•”в–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ    в–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв•‘</text>
<text x="50" y="150" fill="#c084fc" font-family="monospace" font-size="8.5" font-weight="bold" xml:space="preserve"> в•ҡв•җв•җв•қв•ҡв•җв•җв•қ в•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•җв•җв•җв•җв•қ     в•ҡв•җв•қ  в•ҡв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қ  в•ҡв•җв•җв•җв•қ  в•ҡв•җв•қ</text>

        
        <!-- Divider -->
        <line x1="50" y1="210" x2="790" y2="210" stroke="#311840" stroke-width="1.5" stroke-dasharray="5 5" />
        
        <!-- Skills Header -->
        <text x="50" y="225" fill="#eab308" font-family="monospace" font-size="13" font-weight="bold">&gt;_ core_modules_loaded</text>
        
        <!-- Skills/Languages List -->
        
        <text x="50" y="230" fill="#eeddfc" font-family="monospace" font-size="13">
            <tspan fill="#5d4370">&gt; </tspan><tspan font-weight="bold">Java Engineering    </tspan> 
            <tspan fill="#5d4370">[</tspan><tspan fill="#00f0ff">в– в– в– в– в– в– в– в– в– в–Ў</tspan><tspan fill="#5d4370">]</tspan>
            <tspan fill="#5d4370" font-size="11"> // Enterprise API, Decoders</tspan>
        </text>
        
        <text x="50" y="256" fill="#eeddfc" font-family="monospace" font-size="13">
            <tspan fill="#5d4370">&gt; </tspan><tspan font-weight="bold">Python Automation   </tspan> 
            <tspan fill="#5d4370">[</tspan><tspan fill="#ff66cc">в– в– в– в– в– в– в– в– в–Ўв–Ў</tspan><tspan fill="#5d4370">]</tspan>
            <tspan fill="#5d4370" font-size="11"> // System Telemetry, Scripts</tspan>
        </text>
        
        <text x="50" y="282" fill="#eeddfc" font-family="monospace" font-size="13">
            <tspan fill="#5d4370">&gt; </tspan><tspan font-weight="bold">Linux / DevOps      </tspan> 
            <tspan fill="#5d4370">[</tspan><tspan fill="#eab308">в– в– в– в– в– в– в– в– в–Ўв–Ў</tspan><tspan fill="#5d4370">]</tspan>
            <tspan fill="#5d4370" font-size="11"> // Unix Systems, Shell Rice</tspan>
        </text>
        
        
        <!-- Connected Nodes Section (Professional Links) -->
        <text x="50" y="325" fill="#00f0ff" font-family="monospace" font-size="13" font-weight="bold">&gt;_ connected_nodes</text>
        <text x="50" y="348" fill="#eeddfc" font-family="monospace" font-size="13">
            <tspan fill="#5d4370">&gt; </tspan>Website: <tspan fill="#00f0ff">https://pr0t0lain.dpdns.org</tspan>
        </text>
        <text x="50" y="368" fill="#eeddfc" font-family="monospace" font-size="13">
            <tspan fill="#5d4370">&gt; </tspan>LinkedIn: <tspan fill="#00f0ff">https://linkedin.com/in/haru-l41n-pr0t0</tspan>
        </text>
        
        <!-- Oscilloscope Waveform Animation -->
        <g>
            <path d="M 0 420 C 50 390, 100 450, 150 420 C 200 390, 250 450, 300 420 C 350 390, 400 450, 450 420 C 500 390, 550 450, 600 420 C 650 390, 700 450, 750 420 C 800 390, 850 450, 900 420" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.3">
                <animateTransform attributeName="transform" type="translate" from="0,0" to="-300,0" dur="4.5s" repeatCount="indefinite" />
            </path>
            <path d="M 0 420 C 60 440, 120 400, 180 420 C 240 440, 300 400, 360 420 C 420 440, 480 400, 540 420 C 600 440, 660 400, 720 420 C 780 440, 840 400, 900 420" fill="none" stroke="#ff66cc" stroke-width="1" opacity="0.2">
                <animateTransform attributeName="transform" type="translate" from="0,0" to="-360,0" dur="6.5s" repeatCount="indefinite" />
            </path>
        </g>
        
        <!-- Blinking Prompt -->
        <text x="50" y="465" fill="#eeddfc" font-family="monospace" font-size="14">
            <tspan fill="#00f0ff">Wired-Navi0x1F@wired</tspan>:<tspan fill="#ff66cc">~</tspan>$ <tspan fill="#eeddfc">close_world --open-next</tspan>
        </text>
        <rect x="424" y="452" width="8" height="15" class="cursor" />
    </g>

    <!-- Curvature shadow overlay (Spherical screen effect) -->
    <rect x="14" y="14" width="822" height="482" fill="url(#screen-curve)" rx="8" pointer-events="none" />

    <!-- Glass Reflection glare overlay -->
    <rect x="14" y="14" width="822" height="482" fill="url(#glass-reflection)" rx="8" pointer-events="none" />
</svg>
