        <text x="555" y="160" fill="#eeddfc" font-family="monospace" font-size="11">SYNC RATE: 98.2%</text>
        <text x="555" y="180" fill="#eeddfc" font-family="monospace" font-size="10" fill-opacity="0.7">LAST SYNC: 2026-07-10</text>
        
