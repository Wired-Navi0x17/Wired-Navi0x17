<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="100%" height="auto">
    <style>
        .terminal-bg {
            fill: #0e0616;
            stroke: #c084fc;
            stroke-width: 2.5;
        }
        .scanlines {
            fill: url(#scanline-pattern);
            opacity: 0.15;
        }
        .title-text {
            fill: #e9dcf5;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 13px;
        }
        .console-text {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 14px;
        }
        .glow {
            filter: url(#crt-glow);
        }
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        .cursor {
            animation: blink 1s infinite;
            fill: #c084fc;
        }
    </style>

    <defs>
        <!-- CRT Glow Filter -->
        <filter id="crt-glow" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        
        <!-- Scanline Pattern -->
        <pattern id="scanline-pattern" width="820" height="6" patternUnits="userSpaceOnUse">
            <rect width="820" height="3" fill="#000" />
            <rect y="3" width="820" height="3" fill="transparent" />
        </pattern>
        
        <!-- Matrix Grid Pattern -->
        <pattern id="matrix-grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3b1f4a" stroke-width="0.5" opacity="0.2" />
        </pattern>
    </defs>

    <!-- Terminal Window Frame -->
    <rect class="terminal-bg" width="820" height="480" rx="8" />
    
    <!-- Matrix Grid Layout -->
    <rect width="820" height="480" fill="url(#matrix-grid)" rx="8" />
    
    <!-- CRT Effect Scanlines -->
    <rect class="scanlines" width="820" height="480" rx="8" pointer-events="none" />
    
    <!-- Sweeping Laser Scanline (CRT feel) -->
    <rect x="2" y="35" width="816" height="2" fill="#00f0ff" opacity="0.4" filter="url(#crt-glow)">
        <animate attributeName="y" from="35" to="475" dur="7s" repeatCount="indefinite" />
    </rect>
    
    <!-- Header Bar -->
    <rect x="0" y="0" width="820" height="35" rx="8" fill="#3b1f4a" />
    <!-- Window buttons -->
    <circle cx="20" cy="18" r="6" fill="#ff66cc" />
    <circle cx="40" cy="18" r="6" fill="#eab308" />
    <circle cx="60" cy="18" r="6" fill="#00f0ff" />
    
    <!-- Header Title -->
    <text x="410" y="22" class="title-text" text-anchor="middle" font-weight="bold">Wired-Navi0x1F@NAVI-Terminal:~ (Protocol: Copula-0x1F)</text>
    
    <!-- System Diagnostics Block -->
    <g class="console-text glow">
        <!-- Diagnostic Block (Right Side) -->
        <rect x="525" y="70" width="245" height="135" rx="4" fill="#0e0616" stroke="#3b1f4a" stroke-width="1.5" />
        <text x="540" y="95" fill="#00f0ff" font-family="monospace" font-size="12" font-weight="bold">[SYSTEM DIAGNOSTICS]</text>
        <text x="540" y="120" fill="#e9dcf5" font-family="monospace" font-size="11">NODE: Wired-Navi0x1F</text>
        <text x="540" y="140" fill="#e9dcf5" font-family="monospace" font-size="11">COGNITIVE SYNC: 98.4%</text>
        <text x="540" y="160" fill="#e9dcf5" font-family="monospace" font-size="11">WIRED CONNECT: SYNCED</text>
        <text x="540" y="180" fill="#e9dcf5" font-family="monospace" font-size="10" fill-opacity="0.7">UPTIME: 1048596s</text>
        
        <!-- Welcome Messages -->
        <text x="50" y="75" fill="#00f0ff" font-family="monospace" font-size="14" font-weight="bold">&gt; Initializing NAVI-OS v7.25...</text>
        
        <!-- ASCII Logo -->
        <text x="50" y="100" fill="#c084fc" font-family="monospace" font-size="9" font-weight="bold" xml:space="preserve">в–Ҳв–Ҳв•—    в–Ҳв–Ҳв•—в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—     в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв•—</text>
<text x="50" y="113" fill="#c084fc" font-family="monospace" font-size="9" font-weight="bold" xml:space="preserve">в–Ҳв–Ҳв•‘    в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—    в–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘</text>
<text x="50" y="126" fill="#c084fc" font-family="monospace" font-size="9" font-weight="bold" xml:space="preserve">в–Ҳв–Ҳв•‘ в–Ҳв•— в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘    в–Ҳв–Ҳв•”в–Ҳв–Ҳв•— в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘</text>
<text x="50" y="139" fill="#c084fc" font-family="monospace" font-size="9" font-weight="bold" xml:space="preserve">в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘    в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•— в–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘</text>
<text x="50" y="152" fill="#c084fc" font-family="monospace" font-size="9" font-weight="bold" xml:space="preserve">в•ҡв–Ҳв–Ҳв–Ҳв•”в–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ    в–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв•‘</text>
<text x="50" y="165" fill="#c084fc" font-family="monospace" font-size="9" font-weight="bold" xml:space="preserve"> в•ҡв•җв•җв•қв•ҡв•җв•җв•қ в•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•җв•җв•җв•җв•қ     в•ҡв•җв•қ  в•ҡв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қ  в•ҡв•җв•җв•җв•қ  в•ҡв•җв•қ</text>

        
        <!-- Divider -->
        <line x1="50" y1="205" x2="770" y2="205" stroke="#3b1f4a" stroke-width="1.5" stroke-dasharray="5 5" />
        
        <!-- Skills Header -->
        <text x="50" y="215" fill="#eab308" font-family="monospace" font-size="13" font-weight="bold">&gt;_ system_parameters_loaded</text>
        
        <!-- Skills/Languages List -->
        
        <text x="50" y="230" fill="#e9dcf5" font-family="monospace" font-size="13">
            <tspan fill="#6b4f80">&gt; </tspan>Java Core         : 
            <tspan fill="#00f0ff">в– в– в– в– в– в– в– в– в– в–Ў</tspan> 90%
        </text>
        
        <text x="50" y="252" fill="#e9dcf5" font-family="monospace" font-size="13">
            <tspan fill="#6b4f80">&gt; </tspan>Python Automation : 
            <tspan fill="#ff66cc">в– в– в– в– в– в– в– в– в–Ўв–Ў</tspan> 85%
        </text>
        
        <text x="50" y="274" fill="#e9dcf5" font-family="monospace" font-size="13">
            <tspan fill="#6b4f80">&gt; </tspan>Linux & Bash      : 
            <tspan fill="#eab308">в– в– в– в– в– в– в– в– в–Ўв–Ў</tspan> 80%
        </text>
        
        <text x="50" y="296" fill="#e9dcf5" font-family="monospace" font-size="13">
            <tspan fill="#6b4f80">&gt; </tspan>Systems / C++     : 
            <tspan fill="#c084fc">в– в– в– в– в– в– в– в–Ўв–Ўв–Ў</tspan> 70%
        </text>
        
        
        <!-- Terminal Prompt & Command Line -->
        <text x="50" y="325" fill="#e9dcf5" font-family="monospace" font-size="13">
            <tspan fill="#00f0ff">Wired-Navi0x1F@wired</tspan>:<tspan fill="#ff66cc">~</tspan>$ cat thoughts.txt
        </text>
        
        <!-- thoughts.txt output -->
        <text x="50" y="350" fill="#6b4f80" font-family="monospace" font-size="12" font-style="italic">
            &quot;No matter where you are, everyone is always connected.&quot;
        </text>
        <text x="50" y="368" fill="#6b4f80" font-family="monospace" font-size="12" font-style="italic">
            &quot;There is no barrier between the Wired and the Real.&quot;
        </text>
        
        <!-- Oscilloscope "Hum of the Wired" Waveform Animation -->
        <g>
            <path d="M 0 410 C 50 380, 100 440, 150 410 C 200 380, 250 440, 300 410 C 350 380, 400 440, 450 410 C 500 380, 550 440, 600 410 C 650 380, 700 440, 750 410 C 800 380, 850 440, 900 410 C 950 380, 1000 440, 1050 410" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.4">
                <animateTransform attributeName="transform" type="translate" from="0,0" to="-300,0" dur="4s" repeatCount="indefinite" />
            </path>
            <path d="M 0 410 C 60 430, 120 390, 180 410 C 240 430, 300 390, 360 410 C 420 430, 480 390, 540 410 C 600 430, 660 390, 720 410 C 780 430, 840 390, 900 410 C 960 430, 1020 390, 1080 410" fill="none" stroke="#ff66cc" stroke-width="1" opacity="0.25">
                <animateTransform attributeName="transform" type="translate" from="0,0" to="-360,0" dur="6s" repeatCount="indefinite" />
            </path>
        </g>
        
        <!-- Blinking Prompt -->
        <text x="50" y="445" fill="#e9dcf5" font-family="monospace" font-size="14">
            <tspan fill="#00f0ff">Wired-Navi0x1F@wired</tspan>:<tspan fill="#ff66cc">~</tspan>$ <tspan fill="#e9dcf5">El_Psy_Kongroo</tspan>
        </text>
        <rect x="298" y="432" width="8" height="15" class="cursor" />
    </g>
</svg>
