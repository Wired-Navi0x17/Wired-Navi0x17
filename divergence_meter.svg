            <!-- Nixie Digit Tube for '6' -->
            <g transform="translate(579, 0)">
                <!-- Back Grid Metal Mesh (Nixie characteristic) -->
                <rect x="5" y="15" width="55" height="120" rx="10" fill="url(#grid-mesh)" opacity="0.25" stroke="#6c5d77" stroke-width="0.5" />
                
