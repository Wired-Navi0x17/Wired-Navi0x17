name: Update Retro Profile README

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch:      # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate Profile README and SVGs
        run: python build.py

      - name: Generate Contribution Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Wired-Navi0x1F
          outputs: |
            github-contribution-grid-snake.svg
            github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md terminal.svg divergence_meter.svg github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg
          git commit -m "update: sync NAVI terminal parameters, divergence rates, and contribution snake" || echo "No changes to commit"
          git push

